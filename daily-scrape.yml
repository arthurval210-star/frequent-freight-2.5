name: Frequent Freight 2.5 — Daily Scrape

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 5:00 AM CDT / 6:00 AM CST
  workflow_dispatch:        # lets you also trigger it manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python fetch.py

      - name: Commit updated leads
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leads.json dashboard/leads.json exports/
          git diff --cached --quiet || git commit -m "chore: daily freight leads $(date -u '+%Y-%m-%d')"
          git push
